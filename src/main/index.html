<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
    <!-- <script th:inline="javascript">
        /*<![CDATA[*/
        let message = /*[[${message}]]*/ null;
        if (message !== null && message !== '') {
            alert(message);
        }
        /*]]>*/
    </script> -->
</head>
<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
            <div class="main_contents">
                <div th:replace="~{common :: header}"></div>
                    <div class="inner_contens">
                        <div class="page_title">書籍一覧</div>
                         <div style="text-align: right;">
                             <a th:href="@{/book/add}" class="btn">
                             <img th:src="@{/images/icons/add.png}" alt="追加アイコン" class="icon">書籍登録
                            </a>
                         </div>
                         <table bookMst="1" style="width:100%; border-collapse: collapse;">
                            <thead>
                                <tr>
                                    <th>書籍名</th>
                                    <th>ISBN</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book : ${bookMstList}">
                                    <td>
                                        <a th:href="@{/book/edit/{id}(id=${book.id})}" class="edit_btn">
                                            <img th:src="@{/images/icons/edit.png}" alt="編集アイコン" class="edit_icon">
                                        </a>
                                        <a th:href="@{/book/delete}" class="edit_btn" onclick="return confirm('削除してもよろしいですか？');" >
                                            <img th:src="@{/images/icons/trash.png}" alt="削除アイコン"class="edit_icon">
                                        </a>
                                        <span th:text="${book.title}">書籍名</span>
                                    </td>
                                    <td th:text="${book.isbn}">ISBN</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
            </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
    <script th:inline="javascript">
        /*<![CDATA[*/
        let message = /*[[${message}]]*/ null;
        if (message !== null && message !== '') {
            alert(message);
        }
        /*]]>*/
    </script>
</body>
