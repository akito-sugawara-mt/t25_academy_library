<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>
<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
            <div class="main_contents">
                <div th:replace="~{common :: header}"></div>
                    <div class="inner_contens">
                        <div class="page_title">書籍一覧</div>
                         <div style="text-align: right;">
                             <a th:href="@{/book/add}" class="btn">
                             <img th:src="@{/images/icons/add.png}" alt="追加アイコン" class="icon">書籍登録
                            </a>
                         </div>
                         <table bookMst="1" style="width:100%; border-collapse: collapse;">
                            <thead>
                                <tr>
                                    <th>書籍名</th>
                                    <th>ISBN</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book : ${bookMstList}">
                                    <td>
                                        <a th:href="@{/book/edit/{id}(id=${book.id})}" class="edit_btn">
                                            <img th:src="@{/images/icons/edit.png}" alt="編集アイコン" class="edit_icon">
                                        </a>
                                        <form th:action="@{/book/delete/{id}(id=${book.id})}" method="post" th:id="'deleteForm' + ${book.id}" style="display:inline;">
                                            <a href="#" class="edit_btn" th:onclick="'return confirmDelete(' + ${book.id} + ');'">
                                                <img th:src="@{/images/icons/trash.png}" alt="削除アイコン" class="edit_icon">
                                            </a>
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        </form>
                                        <span th:text="${book.title}">書籍名</span>
                                    </td>
                                    <td th:text="${book.isbn}">ISBN</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
            </div>
    </div>
    <div id="customConfirmModal" class="modal" style="display:none;">
        <div class="modal-content">
            <p>本当に削除してもよろしいですか？</p>
            <button id="yesBtn">YES</button>
            <button id="noBtn">NO</button>
        </div>
    </div>
    <div id="flash-message" th:if="${message}" th:attr="data-message=${message}"></div>
    <div id="success-message" th:if="${successMessage}" th:attr="data-success=${successMessage}"></div>
    <div id="error-message" th:if="${errorMessage}" th:attr="data-error=${errorMessage}"></div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const msg = document.getElementById("flash-message")?.dataset.message;
            if (msg) {
                alert(msg);
            }
            const successMsg = document.getElementById("success-message")?.dataset.success;
            if (successMsg) {
            alert(successMsg);
            }
            const errorMsg = document.getElementById("error-message")?.dataset.error;
            if (errorMsg) {
            alert(errorMsg);
            }
        });
        function confirmDelete(bookId) {
            const modal = document.getElementById("customConfirmModal");
            modal.style.display = "flex";

            const yesBtn = document.getElementById("yesBtn");
            const noBtn = document.getElementById("noBtn");

            yesBtn.onclick = function () {
                document.getElementById("deleteForm" + bookId).submit();
                modal.style.display = "none";
            };
            noBtn.onclick = function () {
                modal.style.display = "none";
            };
            return false;
        }
    </script>
    <div th:replace="~{common :: footer}"></div>
</body>
