<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍登録',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/add.css}" />
    <script type="text/javascript" th:src="@{/js/book/add.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍編集</div>
                <div class="page_contents">
                    <form id="book_register_form" th:object="${bookMstDto}" th:action="@{/book/edit}" method="post">
                        <p class="note">＊は必須です </p>
                        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                            <span>
                                <a th:href="@{/book/index}" class="link">← 一覧へ戻る</a>
                            </span>
                        </div>
                        <input type="hidden" th:field="*{id}" />
                            <p>書籍名<span class="mark">＊</span>
                                <input type="text" th:field="*{title}" placeholder="書籍名を入力"/>
                                <div class="error_msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                             </p>
                            <p>ISBN<span class="mark">＊</span>
                                <input type="text" th:field="*{isbn}" placeholder="ISBNを入力"/>
                                <div class="error_msg" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
                             </p> 
                       
                                <button type="submit" class="submit_btn">変更
                                    

                                </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div id="flash-message" th:if="${message}" th:attr="data-message=${message}"></div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const msg = document.getElementById("flash-message")?.dataset.message;
            if (msg) {
                alert(msg);
            }
        });
    </script>
    <div th:replace="~{common :: footer}"></div>
</body>
